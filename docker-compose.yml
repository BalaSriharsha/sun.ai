
services:
  db:
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentic_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/agentic_platform
      # If using sqlite instead of postgres, it'll use the persisted volume
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
      # Mount MCP servers directory and db if using sqlite
      - ./backend/mcp_servers:/app/mcp_servers
      - ./backend/agentic_platform.db:/app/agentic_platform.db
      - ./backend/uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      # This needs to be accessible from the user's browser
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
